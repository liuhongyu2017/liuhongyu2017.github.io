<li><h2 id="Selector-使用"><a href="#Selector-使用" class="headerlink" title="Selector 使用"></a>Selector 使用</h2><p>客户端代码</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@Slf4j</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">Client</span> </span>&#123;</span><br><span class="line">  <span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">main</span><span class="params">(String[] args)</span> <span class="keyword">throws</span> IOException </span>&#123;</span><br><span class="line">    SocketChannel channel = SocketChannel.open();</span><br><span class="line">    channel.connect(<span class="keyword">new</span> InetSocketAddress(<span class="string">&quot;127.0.0.1&quot;</span>, <span class="number">9527</span>));</span><br><span class="line">    log.info(<span class="string">&quot;waiting...&quot;</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></li>
<li><p>服务端代码</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@Slf4j</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">Server</span> </span>&#123;<span class="function">n</span></span><br><span class="line"><span class="function">  <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">main</span><span class="params">(String[] args)</span> <span class="keyword">throws</span> IOException </span>&#123;</span><br><span class="line">    <span class="comment">// 0. 创建selector</span></span><br><span class="line">    Selector selector = Selector.open();</span><br><span class="line">    <span class="comment">// 1. 创建通道</span></span><br><span class="line">    ServerSocketChannel ssc = ServerSocketChannel.open();</span><br><span class="line">    <span class="comment">// 2. 设置为非阻塞模式</span></span><br><span class="line">    ssc.configureBlocking(<span class="keyword">false</span>);</span><br><span class="line">    <span class="comment">// 3. 注册selector</span></span><br><span class="line">    SelectionKey selectionKey = ssc.register(selector, <span class="number">0</span>, <span class="keyword">null</span>);</span><br><span class="line">    <span class="comment">// 4. 设置selector关注类型</span></span><br><span class="line">    selectionKey.interestOps(SelectionKey.OP_ACCEPT);</span><br><span class="line">    log.info(<span class="string">&quot;register key: &#123;&#125;&quot;</span>, selectionKey);</span><br><span class="line">    <span class="comment">// 5. 监听端口</span></span><br><span class="line">    ssc.bind(<span class="keyword">new</span> InetSocketAddress(<span class="number">9527</span>));</span><br><span class="line">    <span class="keyword">while</span> (<span class="keyword">true</span>) &#123;</span><br><span class="line">      <span class="comment">// 6. 没有事件发生线程阻塞，有事件发生线程恢复</span></span><br><span class="line">      <span class="comment">// selector 在事件未被处理时，它不会阻塞。事件发生后，要么处理，要么取消，不能不进行处理</span></span><br><span class="line">      selector.select();</span><br><span class="line">      <span class="comment">// 7. 处理事件，selectorKey中包含所有发生的事件</span></span><br><span class="line">      <span class="keyword">final</span> Iterator&lt;SelectionKey&gt; iterator = selector.selectedKeys().iterator();</span><br><span class="line">      <span class="keyword">while</span> (iterator.hasNext()) &#123;</span><br><span class="line">        <span class="keyword">final</span> SelectionKey key = iterator.next();</span><br><span class="line">        log.info(<span class="string">&quot;key: &#123;&#125;&quot;</span>, key.getClass());</span><br><span class="line">        iterator.remove();</span><br><span class="line">        <span class="keyword">if</span> (key.isAcceptable()) &#123;</span><br><span class="line">          ServerSocketChannel channel = (ServerSocketChannel) key.channel();</span><br><span class="line">          SocketChannel sc = channel.accept();</span><br><span class="line">          sc.configureBlocking(<span class="keyword">false</span>);</span><br><span class="line">          SelectionKey scKey = sc.register(selector, <span class="number">0</span>, <span class="keyword">null</span>);</span><br><span class="line">          scKey.interestOps(SelectionKey.OP_READ);</span><br><span class="line">          log.info(<span class="string">&quot;&#123;&#125;&quot;</span>, sc);</span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (key.isReadable()) &#123;</span><br><span class="line">          SocketChannel channel = (SocketChannel) key.channel();</span><br><span class="line">          ByteBuffer byteBuffer = ByteBuffer.allocate(<span class="number">16</span>);</span><br><span class="line">          <span class="keyword">int</span> read = channel.read(byteBuffer);</span><br><span class="line">          <span class="comment">// 如果时正常断开，read 返回值是-1</span></span><br><span class="line">          <span class="keyword">if</span> (read == -<span class="number">1</span>) &#123;</span><br><span class="line">            key.cancel();</span><br><span class="line">          &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            byteBuffer.flip();</span><br><span class="line">            debugAll(byteBuffer);</span><br><span class="line">          &#125;</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">          <span class="comment">// 取消事件</span></span><br><span class="line">          key.cancel();</span><br><span class="line">        &#125;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></li>
</ol>
